<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReadSnap Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>ReadSnap Settings</h1>

    <div class="field">
      <label for="token">Readwise Reader API Token</label>
      <div class="token-row">
        <input type="password" id="token" placeholder="Enter your token">
        <button id="btn-test" class="btn btn-secondary">Test</button>
      </div>
      <p class="hint">Get your token from <a href="https://readwise.io/access_token" target="_blank">readwise.io/access_token</a></p>
    </div>

    <div class="field">
      <label for="language">OCR Language</label>
      <select id="language">
        <option value="eng">English</option>
        <option value="ita">Italiano</option>
        <option value="eng+ita">English + Italiano</option>
      </select>
    </div>

    <div class="field">
      <label for="tags">Default Tags <span class="hint-inline">(comma separated)</span></label>
      <input type="text" id="tags" placeholder="screenshot, ocr">
    </div>

    <div class="field">
      <label>Keyboard Shortcuts</label>
      <div class="shortcuts-list" id="shortcuts-list"></div>
      <button id="btn-shortcuts" class="btn btn-secondary btn-block">Customize Shortcuts</button>
      <p class="hint">Opens the browser's shortcut settings where you can change or remove any shortcut.</p>
    </div>

    <div class="actions">
      <button id="btn-save" class="btn btn-primary">Save</button>
      <span id="save-status" class="save-status"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
